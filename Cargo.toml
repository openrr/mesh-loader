[package]
name = "mesh-loader"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/openrr/mesh-loader"
keywords = ["asset", "mesh", "stl"] # TODO: "collada", "obj"
categories = ["parser-implementations", "graphics"]
exclude = ["/.*", "/assets"]
description = """
Fast parser for 3D-model-formats.
"""

[workspace]
resolver = "2"
members = ["example"]

[features]
default = ["stl"]

# STL (.stl)
# https://en.wikipedia.org/wiki/STL_(file_format)
stl = ["rustc-hash"]
# TODO
# # COLLADA (.dae)
# # https://en.wikipedia.org/wiki/COLLADA
# collada = []
# TODO
# # Wavefront OBJ (.obj)
# # https://en.wikipedia.org/wiki/Wavefront_.obj_file
# obj = []

# NOTE: anyhow, indexmap, slotmap, tracing are public dependencies
[dependencies]
# Used in all formats.
fast-float = "0.2"
memchr = "2.4"

# Used in STL parsing.
rustc-hash = { version = "1", optional = true }

# Used in COLLADA parsing.
indexmap = { version = "1.5.2", features = ["std"] }
roxmltree = "0.14"
slotmap = "1.0.5"

# TODO: remove
anyhow = "1"

[dev-dependencies]
similar-asserts = "1"
tracing = { version = "0.1", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi"] }
walkdir = "2"

assimp = "0.3"
piston_collada = { package = "collada", version = "0.14" }

[profile.bench]
# codegen-units = 1
# lto = true
