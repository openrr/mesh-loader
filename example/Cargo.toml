[package]
name = "examples"
version = "0.0.0"
edition = "2021"
publish = false

[dev-dependencies]
mesh-loader = { path = ".." }

anyhow = "1"
bevy = { version = "0.5", default-features = false, features = ["bevy_dynamic_plugin", "bevy_winit", "render", "x11"] }
bevy_app = "0.5"
bevy_asset = "0.5"
bevy_render = "0.5"
bevy_utils = "0.5"
clap = { version = "=3.0.0-beta.2", features = ["derive"] }
kiss3d = "0.33"
tracing = { version = "0.1", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi", "env-filter"] }

[[example]]
name = "bevy"
path = "bevy.rs"

[[example]]
name = "kiss3d"
path = "kiss3d.rs"
